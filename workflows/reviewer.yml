# .github/workflows/reviewer.yml
#
# PRaC Automated PR Reviewer
#
# Trigger: PR opened or updated
# Filter:  Only reviews PRs from Jules (detected via PR body)
# Action:  Runs review-pr.js → auto-merge or send feedback to Jules
#
# Install via: npx @ydax/prac-kit init

name: Automated PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: reviewer-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, 'Jules for task')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract Jules metadata from PR
        id: metadata
        run: |
          node -e "
            const fs = require('fs');
            const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf-8'));
            const body = event.pull_request.body || '';
            const headRef = event.pull_request.head.ref || '';
            const prNumber = event.pull_request.number;

            const sessionMatch = body.match(/Jules for task \[?(\d+)/);
            const sessionId = sessionMatch ? sessionMatch[1] : '';

            // Extract Linear ID from branch name (e.g., haa-7-description or sig-14-feature)
            const linearMatch = headRef.match(/^([a-z]+-\d+)/i);
            let linearId = linearMatch ? linearMatch[1].toUpperCase() : '';

            if (!linearId) {
              const closesMatch = body.match(/Closes ([A-Z]+-\d+)/i);
              linearId = closesMatch ? closesMatch[1].toUpperCase() : '';
            }

            const outputFile = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(outputFile, 'session_id=' + sessionId + '\n');
            fs.appendFileSync(outputFile, 'linear_id=' + linearId + '\n');
            fs.appendFileSync(outputFile, 'pr_number=' + prNumber + '\n');
            console.log('📋 PR #' + prNumber + ' | Session: ' + sessionId + ' | Linear: ' + linearId);
          "

      - name: Run Reviewer
        if: steps.metadata.outputs.session_id != '' && steps.metadata.outputs.linear_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/review-pr.js \
            --linear-id "${{ steps.metadata.outputs.linear_id }}" \
            --pr-number "${{ steps.metadata.outputs.pr_number }}" \
            --session-id "${{ steps.metadata.outputs.session_id }}"
