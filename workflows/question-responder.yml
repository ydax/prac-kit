# .github/workflows/question-responder.yml
#
# PRaC Jules Question Auto-Responder
#
# Trigger: Runs on a cron schedule (default: every 30 minutes)
# Action:  Polls Jules for blocked sessions, auto-responds or escalates
#
# Safety:  Only responds when LLM confidence is HIGH.
#          Creates GitHub Issues for human review on ESCALATE.
#          Hard limit of 5 auto-responses per day (configurable).
#
# Install via: npx @ydax/prac-kit init

name: Jules Question Responder

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  respond:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for blocked Jules sessions
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/question-responder.js
